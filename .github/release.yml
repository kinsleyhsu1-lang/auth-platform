changelog:
  categories:
    - title: "Breaking Changes"
      labels:
        - "breaking"
    - title: "Security"
      labels:
        - "security"
    - title: "Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Fixes"
      labels:
        - "bug"
    - title: "Docs"
      labels:
        - "docs"
    - title: "Chores"
      labels:
        - "chore"
  exclude:
    labels:
      - "skip-release-notes"
