name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kinsley
          POSTGRES_DB: kinsley
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kinsley -d kinsley"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Set env
        run: |
          echo "DATABASE_URL=postgres://kinsley:password@localhost:5432/kinsley" >> .env
          echo "DATABASE_URL=postgres://kinsley:password@localhost:5432/kinsley" >> $GITHUB_ENV
          echo "JWT_SECRET=test-secret" >> .env
          echo "JWT_EXPIRES_IN=15m" >> .env
          echo "JWT_ISSUER=local-dev" >> .env
          echo "JWT_AUDIENCE=local-client" >> .env
          echo "REFRESH_TOKEN_SECRET=test-refresh-secret" >> .env
          echo "REFRESH_TTL_DAYS=30" >> .env
          echo "VERIFY_TTL_HOURS=24" >> .env
          echo "RESET_TTL_HOURS=1" >> .env
          echo "LOCKOUT_THRESHOLD=5" >> .env
          echo "LOCKOUT_WINDOW_MINUTES=15" >> .env
          echo "LOCKOUT_DURATION_MINUTES=15" >> .env
          echo "AUTH_RATE_LIMIT_WINDOW_MS=900000" >> .env
          echo "AUTH_RATE_LIMIT_MAX=20" >> .env
          echo "CLEANUP_INTERVAL_MS=3600000" >> .env
          echo "LOG_LEVEL=error" >> .env
          echo "USE_REFRESH_COOKIE=false" >> .env
          echo "EXPOSE_REFRESH_TOKEN=true" >> .env
          echo "CSRF_COOKIE_NAME=csrf_token" >> .env
          echo "CSRF_HEADER_NAME=x-csrf-token" >> .env
          echo "SENDGRID_ENABLED=false" >> .env
          echo "SENDGRID_SANDBOX_MODE=false" >> .env
          echo "APP_BASE_URL=http://localhost:3000" >> .env

      - name: Run migrations
        run: |
          psql "$DATABASE_URL" -f ./migrations.sql
          psql "$DATABASE_URL" -f ./migrations_step2.sql
          psql "$DATABASE_URL" -f ./migrations_step3.sql
          psql "$DATABASE_URL" -f ./migrations_step4.sql
          psql "$DATABASE_URL" -f ./migrations_step6.sql

      - name: Test
        run: npm test
